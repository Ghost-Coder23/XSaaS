{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Timetable Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'timetable/css/style.css' %}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <div class="login-title">Timetable Manager</div>
    <div class="login-subtitle">Sign in to manage your school timetables</div>

    {% if form.errors %}
    <div style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:.875rem;color:#f87171;">
      Invalid username or password.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input name="username" type="text" class="form-control" placeholder="Enter your username" autofocus required>
      </div>
      <div class="form-group" style="margin-bottom:22px">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Sign In</button>
    </form>
  </div>
</div>
</body>
</html>
