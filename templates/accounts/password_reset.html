{% extends 'base.html' %}
{% block title %}Reset Password — EduCore{% endblock %}
{% block content %}
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-5">
<div class="card border-0 shadow-lg" style="border-radius:20px;">
<div class="card-body p-5">
<div class="text-center mb-4">
<i class="bi bi-key-fill text-primary" style="font-size:3rem;"></i>
<h3 class="fw-bold mt-3">Reset Password</h3>
<p class="text-muted">Enter your email and we'll send reset instructions.</p>
</div>
<form method="post">{% csrf_token %}
<div class="mb-3">
<label class="form-label">Email Address</label>
<div class="input-group">
<span class="input-group-text"><i class="bi bi-envelope"></i></span>
<input type="email" name="email" class="form-control" placeholder="Enter your email" required>
</div>
</div>
<div class="d-grid"><button type="submit" class="btn btn-primary btn-lg">Send Reset Link</button></div>
</form>
<hr class="my-4">
<div class="text-center"><a href="{% url 'login' %}" class="text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Back to Login</a></div>
</div></div>
</div></div></div>
{% endblock %}
