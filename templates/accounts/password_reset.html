{% extends 'base.html' %}

{% block title %}Reset Password - AcademiaLink{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
    }
    .reset-card {
        border-radius: 24px;
        border: none;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        overflow: hidden;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
    }
    .reset-header {
        background: var(--primary);
        padding: 40px 20px;
        color: white;
        text-align: center;
    }
    .reset-header i {
        font-size: 3.5rem;
        margin-bottom: 15px;
        display: inline-block;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }
    .form-control {
        border-radius: 12px;
        padding: 12px 15px;
        border: 1px solid #e2e8f0;
        transition: all 0.3s ease;
    }
    .form-control:focus {
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        border-color: var(--primary);
    }
    .input-group-text {
        border-radius: 12px 0 0 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        color: #64748b;
    }
    .btn-reset {
        border-radius: 12px;
        padding: 14px;
        font-weight: 600;
        font-size: 1.1rem;
        transition: all 0.3s ease;
        background: var(--primary);
        border: none;
    }
    .btn-reset:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3);
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card reset-card">
                <div class="reset-header">
                    <i class="bi bi-key-fill"></i>
                    <h3 class="fw-bold mb-1">Reset Password</h3>
                    <p class="opacity-75 mb-0">We'll email you reset instructions</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold text-uppercase">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-reset">
                                <i class="bi bi-send-fill me-2"></i>Send Reset Link
                            </button>
                        </div>
                    </form>
                    <div class="text-center mt-4">
                        <a href="{% url 'accounts:login' %}" class="text-muted text-decoration-none small fw-semibold">
                            <i class="bi bi-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
