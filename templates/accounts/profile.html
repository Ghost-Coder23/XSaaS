{% extends 'base_dashboard.html' %}
{% block title %}My Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7">
<div class="card">
<div class="card-header">Profile Settings</div>
<div class="card-body">
<form method="post" enctype="multipart/form-data">{% csrf_token %}
<div class="row g-3">
<div class="col-md-6"><label class="form-label">First Name</label>
<input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}" class="form-control"></div>
<div class="col-md-6"><label class="form-label">Last Name</label>
<input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}" class="form-control"></div>
<div class="col-12"><label class="form-label">Email</label>
<input type="email" name="email" value="{{ form.email.value|default:'' }}" class="form-control"></div>
<div class="col-md-6"><label class="form-label">Phone</label>
<input type="text" name="phone" value="{{ form.phone.value|default:'' }}" class="form-control"></div>
<div class="col-md-6"><label class="form-label">Date of Birth</label>
<input type="date" name="date_of_birth" value="{{ form.date_of_birth.value|default:'' }}" class="form-control"></div>
<div class="col-12"><label class="form-label">Bio</label>
<textarea name="bio" class="form-control" rows="3">{{ form.bio.value|default:'' }}</textarea></div>
<div class="col-12"><label class="form-label">Profile Picture</label>
{% if request.user.profile.profile_picture %}<div class="mb-2"><img src="{{ request.user.profile.profile_picture.url }}" height="60" class="rounded-circle"></div>{% endif %}
<input type="file" name="profile_picture" class="form-control" accept="image/*"></div>
</div>
<div class="mt-4 d-flex gap-2">
<button type="submit" class="btn btn-primary">Save Changes</button>
	<a href="{% url 'accounts:change_password' %}" class="btn btn-outline-secondary">Change Password</a>
</div>
</form>
</div></div>
</div></div>
{% endblock %}
