{% extends 'base_dashboard.html' %}
{% block title %}Upload Signature{% endblock %}
{% block page_title %}Upload Signature{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">Upload Your Signature</div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">{% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary">Upload</button>
          <a href="{% url 'school_settings' %}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
