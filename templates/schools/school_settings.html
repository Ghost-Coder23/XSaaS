{% extends 'base_dashboard.html' %}
{% block title %}School Settings{% endblock %}
{% block page_title %}School Settings{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<div class="card">
<div class="card-header">Branding & Settings</div>
<div class="card-body">
<form method="post" enctype="multipart/form-data">
{% csrf_token %}
<div class="mb-3">
<label class="form-label fw-bold">School Logo</label>
{% if object.logo %}<div class="mb-2"><img src="{{ object.logo.url }}" height="60" class="rounded"></div>{% endif %}
<input type="file" name="logo" class="form-control" accept="image/*">
</div>
<div class="mb-3">
<label class="form-label fw-bold">Theme Color</label>
<input type="color" name="theme_color" value="{{ object.theme_color|default:'#4F46E5' }}" class="form-control form-control-color">
</div>
<div class="mb-3">
<label class="form-label fw-bold">School Motto</label>
<input type="text" name="motto" value="{{ object.motto|default:'' }}" class="form-control" placeholder="e.g. Excellence in Education">
</div>
<button type="submit" class="btn btn-primary">Save Settings</button>
</form>
<div class="mb-3">
<a href="{% url 'upload_signature' %}" class="btn btn-outline-secondary">Upload Your Signature</a>
</div>
</div>
</div>
</div>
{% endblock %}
