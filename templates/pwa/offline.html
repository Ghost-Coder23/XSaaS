<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — EduCore</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#f1f5f9; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
.card { background:#fff; border-radius:16px; padding:2.5rem; text-align:center; max-width:400px; width:100%; box-shadow:0 4px 24px rgba(0,0,0,.08); }
.icon { font-size:3rem; margin-bottom:1rem; }
h2 { font-size:1.4rem; font-weight:700; color:#1e293b; margin-bottom:.5rem; }
p { color:#64748b; font-size:.9rem; line-height:1.6; margin-bottom:1.5rem; }
.btn { background:#4F46E5; color:#fff; border:none; border-radius:8px; padding:.65rem 1.5rem; font-size:.9rem; cursor:pointer; text-decoration:none; display:inline-block; }
.btn:hover { background:#3730a3; color:#fff; }
.features { background:#f8fafc; border-radius:10px; padding:1rem; text-align:left; margin-bottom:1.5rem; }
.features li { font-size:.83rem; color:#475569; margin-bottom:.3rem; list-style:none; padding-left:1.2rem; position:relative; }
.features li::before { content:"✓"; position:absolute; left:0; color:#16a34a; font-weight:700; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📶</div>
  <h2>You're Offline</h2>
  <p>No internet connection detected. You can still use some EduCore features offline.</p>
  <ul class="features">
    <li>Mark attendance (syncs when online)</li>
    <li>View cached student lists</li>
    <li>View cached results</li>
    <li>Enter marks (saves locally)</li>
  </ul>
  <p style="font-size:.8rem;">Your data will automatically sync when your connection is restored.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</div>
<script>
window.addEventListener('online', () => { window.location.href = '/analytics/dashboard/'; });
</script>
</body>
</html>
