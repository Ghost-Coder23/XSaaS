{% extends "base_dashboard.html" %}
{% block title %}New Announcement{% endblock %}
{% block page_title %}Create Announcement{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header"><i class="bi bi-megaphone me-2"></i>New Announcement</div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:.83rem;">Title</label>
            <input type="text" name="title" class="form-control" required placeholder="Announcement title">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:.83rem;">Message</label>
            <textarea name="content" class="form-control" rows="5" required placeholder="Write your announcement..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:.83rem;">Audience</label>
            <select name="audience" class="form-select">
              <option value="all">Everyone</option>
              <option value="teachers">Teachers Only</option>
              <option value="parents">Parents Only</option>
              <option value="students">Students Only</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-send me-1"></i>Publish & Notify</button>
            <a href="{% url 'notifications:announcements' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
