{% extends 'base_dashboard.html' %}
{% block title %}Add Grade Scale{% endblock %}
{% block page_title %}Add Grade Scale{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
<div class="card"><div class="card-body">
<form method="post">{% csrf_token %}
<div class="mb-3"><label class="form-label">Grade Letter</label><input type="text" name="grade" class="form-control" placeholder="e.g. A" maxlength="5" required></div>
<div class="mb-3"><label class="form-label">Min Score (%)</label><input type="number" name="min_score" class="form-control" min="0" max="100" step="0.5" required></div>
<div class="mb-3"><label class="form-label">Max Score (%)</label><input type="number" name="max_score" class="form-control" min="0" max="100" step="0.5" required></div>
<div class="mb-3"><label class="form-label">Description</label><input type="text" name="description" class="form-control" placeholder="e.g. Excellent"></div>
<button type="submit" class="btn btn-primary">Save</button>
<a href="{% url 'results:grade_scale_list' %}" class="btn btn-secondary ms-2">Cancel</a>
</form>
</div></div>
</div></div>
{% endblock %}
